<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="expression" id="expression">&nbsp;</div>
    <div class="result" id="result">0</div>
  </div>

  <div class="buttons">
    <button class="btn-action" id="btn-clear" onclick="pressClear()">AC</button>
    <button class="btn-action" onclick="pressSign()">+/-</button>
    <button class="btn-action" onclick="pressPercent()">%</button>
    <button class="btn-operator" onclick="pressOperator('/')">÷</button>

    <button class="btn-digit" onclick="pressDigit('7')">7</button>
    <button class="btn-digit" onclick="pressDigit('8')">8</button>
    <button class="btn-digit" onclick="pressDigit('9')">9</button>
    <button class="btn-operator" onclick="pressOperator('*')">×</button>

    <button class="btn-digit" onclick="pressDigit('4')">4</button>
    <button class="btn-digit" onclick="pressDigit('5')">5</button>
    <button class="btn-digit" onclick="pressDigit('6')">6</button>
    <button class="btn-operator" onclick="pressOperator('-')">-</button>

    <button class="btn-digit" onclick="pressDigit('1')">1</button>
    <button class="btn-digit" onclick="pressDigit('2')">2</button>
    <button class="btn-digit" onclick="pressDigit('3')">3</button>
    <button class="btn-operator" onclick="pressOperator('+')">+</button>

    <button class="btn-digit btn-zero" onclick="pressDigit('0')">0</button>
    <button class="btn-digit" onclick="pressDecimal()">.</button>
    <button class="btn-operator" onclick="pressEqual()">=</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
